name: CI - Pull Request

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Ejecutar tests
        run: pnpm run test
